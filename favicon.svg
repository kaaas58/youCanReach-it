<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="r" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="32" height="32" fill="white"/>
  <circle cx="16" cy="16" r="13" fill="none"
    stroke="#4A4039" stroke-width="2.2" stroke-linecap="round" filter="url(#r)"/>

  <!-- Pfeil -->
  <g transform="translate(25.5,6.5) rotate(-38)">
    <line x1="0" y1="2.5" x2="0" y2="-1.5" stroke="#4A4039" stroke-width="1.2" stroke-linecap="round"/>
    <polyline points="-2,0 0,-3 2,0" fill="none" stroke="#4A4039"
      stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="16" y="14.5" text-anchor="middle"
    font-family="'Dancing Script', Georgia, cursive"
    font-size="5.8" font-weight="600" fill="#3A3028" letter-spacing="0.3">you can</text>
  <text x="16" y="21.5" text-anchor="middle"
    font-family="'Dancing Script', Georgia, cursive"
    font-size="5.8" font-weight="600" fill="#3A3028" letter-spacing="0.3">reach it</text>
</svg>
